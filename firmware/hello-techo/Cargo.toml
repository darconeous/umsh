[package]
name = "firmware-hello-techo"
description = "LilyGO T-Echo bringup firmware (USB-CDC + heartbeat + e-paper hello-world)"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

# Minimal bringup firmware for the LilyGO T-Echo. Does not pretend to
# be a "real" companion-radio or repeater — it is a stepping stone
# whose only jobs are to validate the embassy / UF2 / flash workflow
# and prove out the safety primitives (1200-baud reset, escape rescue,
# panic-persist, WDT) on a recoverable device before pointing the same
# patterns at the sealed T1000-E.
#
# See docs/firmware-plan-techo.md for the full plan.
#
# Like the other firmware crates, this is in `workspace.members` but
# NOT in `default-members`, so root-level `cargo check` does not try
# to cross-compile it on the developer's host.

[[bin]]
name = "firmware-hello-techo"
path = "src/main.rs"

[dependencies]
umsh-bsp-techo = { path = "../../crates/umsh-bsp-techo", default-features = false }
umsh-bsp-nrf52840 = { path = "../../crates/umsh-bsp-nrf52840", default-features = false }
umsh-ux-tracker = { path = "../../crates/umsh-ux-tracker", default-features = false }

# Embedded-only deps. Gated on `target_os = "none"` so this crate still
# parses and trivially compiles on host as an empty `fn main()`. The
# real firmware build uses the embedded target via the .cargo/config.toml
# in this directory.
[target.'cfg(target_os = "none")'.dependencies]
cortex-m = "0.7"
cortex-m-rt = "0.7"
panic-halt = "1"
