# Per-firmware cargo config. Only applied when cargo is invoked from
# within this directory (or a subdirectory). Workspace-root `cargo check`
# does not inherit this — that's intentional and is why this firmware
# crate is excluded from `default-members`.

[build]
target = "thumbv7em-none-eabihf"

[target.thumbv7em-none-eabihf]
# Probe-rs is the standard SWD runner. The Wio Tracker L1 exposes SWD
# on the board (per the hardware reconstruction), so an SWD probe is
# usable for developers who have one. Developers without a probe rely
# on UF2 + serial DFU via the bootloader; see scripts/flash.py.
runner = "probe-rs run --chip nRF52840_xxAA"

rustflags = [
  "-C", "link-arg=-Tlink.x",
]
