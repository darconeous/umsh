# Workspace-wide target selection: everything in this workspace is ESP32
# firmware, so unlike the root workspace (host-default, per-crate overrides)
# the cross target is set once here.
[build]
target = "xtensa-esp32-none-elf"

[target.xtensa-esp32-none-elf]
runner = "espflash flash --monitor"
rustflags = [
    "-C", "link-arg=-nostartfiles",
    "-C", "link-arg=-Wl,-Tlinkall.x",
]

[env]
ESP_LOG = "info"
# esp-hal's default minimum chip revision for esp32 is v3.0 (value is
# major*100+minor). Heltec V2 boards ship old silicon — the reference unit
# is rev v1.1 — so accept anything from v1.0 up. None of the rev-gated
# errata paths matter here: no PSRAM on this board and no dual-core use.
ESP_HAL_CONFIG_MIN_CHIP_REVISION = "100"

[unstable]
build-std = ["core", "alloc"]
