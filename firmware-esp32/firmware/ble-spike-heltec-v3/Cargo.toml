[package]
name = "firmware-ble-spike-heltec-v3"
description = "Version-pinning spike: esp-radio BLE controller + trouble-host on ESP32-S3"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
name = "firmware-ble-spike-heltec-v3"
path = "src/main.rs"

[dependencies]
umsh-bsp-esp32 = { path = "../../crates/umsh-bsp-esp32", features = ["esp32s3", "panic-handler"] }
umsh-bsp-heltec-lora32-v3 = { path = "../../crates/umsh-bsp-heltec-lora32-v3" }
# The chip-agnostic BLE bond journal (codec + power-cut-safe record
# engine). heapless 0.8-based; coexists with the GATT stack's 0.9.
umsh-journal-store = { path = "../../../crates/umsh-journal-store" }
# Minimal companion-radio protocol (path A): the real Session + GATT frame
# transport so the UMSH app can attach_existing. Host-tested pure crates.
umsh-companion = { path = "../../../crates/umsh-companion", default-features = false }
umsh-companion-ncp = { path = "../../../crates/umsh-companion-ncp", default-features = false }
umsh-crypto = { path = "../../../crates/umsh-crypto", default-features = false, features = ["software-crypto"] }

bt-hci = { version = "0.9", default-features = false }
heapless = { version = "0.9", default-features = false }
# The journal payload types are built on heapless 0.8 (workspace version).
heapless08 = { package = "heapless", version = "0.8", default-features = false }
embassy-executor = { version = "0.10", default-features = false }
embassy-futures = { version = "0.1", default-features = false }
# Mutex sharing the one flash driver across the journal handles.
embassy-sync = { version = "0.8", default-features = false }
embassy-time = { version = "0.5", default-features = false }
embedded-graphics = { version = "0.8", default-features = false }
# Raw flash over the internal SPI NOR (bond journal backing). The chip
# feature and `embedded-storage` impl come from umsh-bsp-esp32's esp-storage
# dependency via feature unification; the journal uses FlashStorage's
# inherent read/write/erase.
esp-storage = { version = "0.9", default-features = false, features = ["critical-section", "embedded-storage"] }
esp-alloc = { version = "0.10" }
esp-bootloader-esp-idf = { version = "0.5", features = ["esp32s3"] }
esp-hal = { version = "1.1", features = ["esp32s3", "unstable"] }
esp-println = { version = "0.17", features = ["esp32s3"] }
esp-radio = { version = "1.0.0-beta.0", features = ["esp32s3", "ble", "unstable"] }
esp-rtos = { version = "0.3", features = ["esp32s3", "embassy", "esp-radio", "esp-alloc"] }
static_cell = "2"
trouble-host = { version = "0.7", default-features = false, features = ["derive", "peripheral", "gatt", "security", "default-packet-pool", "default-packet-pool-mtu-255"] }
