[package]
name = "firmware-hello-heltec-v2"
description = "Heltec WiFi LoRa 32 V2 bringup: embassy heartbeat, UART0 banner, RWDT, panic capture"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
name = "firmware-hello-heltec-v2"
path = "src/main.rs"

[dependencies]
umsh-bsp-esp32 = { path = "../../crates/umsh-bsp-esp32", features = ["esp32", "panic-handler"] }
umsh-bsp-heltec-lora32-v2 = { path = "../../crates/umsh-bsp-heltec-lora32-v2" }
umsh-ux-tracker = { path = "../../../crates/umsh-ux-tracker" }

embassy-executor = { version = "0.10", default-features = false }
embassy-futures = { version = "0.1", default-features = false }
embassy-sync = { version = "0.8", default-features = false }
embassy-time = { version = "0.5", default-features = false }
embedded-graphics = { version = "0.8", default-features = false }
esp-bootloader-esp-idf = { version = "0.5", features = ["esp32"] }
esp-hal = { version = "1.1", features = ["esp32", "unstable"] }
esp-rtos = { version = "0.3", features = ["esp32", "embassy"] }
esp-println = { version = "0.17", features = ["esp32"] }
heapless = "0.9"
