[package]
name = "firmware-hello-heltec-v3"
description = "Heltec WiFi LoRa 32 V3 bringup: embassy heartbeat, UART0 banner, RWDT, panic capture"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
name = "firmware-hello-heltec-v3"
path = "src/main.rs"

[dependencies]
umsh-bsp-esp32 = { path = "../../crates/umsh-bsp-esp32", features = ["esp32s3", "panic-handler"] }
umsh-bsp-heltec-lora32-v3 = { path = "../../crates/umsh-bsp-heltec-lora32-v3" }
umsh-radio-loraphy = { path = "../../../crates/umsh-radio-loraphy", default-features = false }
umsh-ux-tracker = { path = "../../../crates/umsh-ux-tracker" }
# For the `KeyValueStore` trait used to exercise the flash store.
umsh-hal = { path = "../../../crates/umsh-hal", default-features = false, features = ["embassy"] }
static_cell = "2"

embassy-executor = { version = "0.10", default-features = false }
embassy-futures = { version = "0.1", default-features = false }
embassy-sync = { version = "0.8", default-features = false }
embassy-time = { version = "0.5", default-features = false }
embedded-graphics = { version = "0.8", default-features = false }
esp-bootloader-esp-idf = { version = "0.5", features = ["esp32s3"] }
# The MAC/crypto stack needs a global allocator (the nRF boards use
# embedded-alloc for the same reason).
esp-alloc = { version = "0.10" }
esp-hal = { version = "1.1", features = ["esp32s3", "unstable"] }
esp-rtos = { version = "0.3", features = ["esp32s3", "embassy", "esp-radio", "esp-alloc"] }
# The BLE controller is brought up as the RF entropy source that makes the
# hardware TRNG a true noise source (see umsh_bsp_esp32::rng).
esp-radio = { version = "1.0.0-beta.0", features = ["esp32s3", "ble", "unstable"] }
# Ed25519 identity derived from the persisted secret scalar.
umsh-crypto = { path = "../../../crates/umsh-crypto", default-features = false, features = ["software-crypto"] }
esp-println = { version = "0.17", features = ["esp32s3"] }
# 0.8 to match umsh-radio-loraphy's frame Vec type.
heapless = { version = "0.8", default-features = false }
# Resolves to ../../lora-rs via the workspace [patch].
lora-phy = { version = "3.0.2-alpha", default-features = false }
embedded-hal-bus = { version = "0.3", default-features = false, features = ["async"] }
